spring:
  application:
    name: team-task-tracker

server:
  port: 8081

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:tasktracker}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTSigningAndItMustBeAtLeast256BitsLong!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Logging
logging:
  level:
    com.tracker: DEBUG
    org.springframework.security: INFO

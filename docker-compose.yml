version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: task-tracker-db
    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: TrackerPassword123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker_user -d tasktracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-tracker-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/tasktracker
      - SPRING_DATASOURCE_USERNAME=tracker_user
      - SPRING_DATASOURCE_PASSWORD=TrackerPassword123!
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-tracker-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
